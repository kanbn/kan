packages:
  - apps/*
  - packages/*
  - tooling/*

# Only install package versions published at least 7 days ago (10080 minutes)
# to reduce exposure to supply-chain attacks via freshly published releases.
minimumReleaseAge: 10080

catalog:
  "@tanstack/react-query": ^5.59.15
  "@trpc/client": ^11.4.3
  "@trpc/react-query": ^11.4.3
  "@trpc/server": ^11.4.3
  eslint: ^9.12.0
  prettier: ^3.3.3
  tailwindcss: ^3.4.14
  typescript: ^5.6.3
  zod: ^3.23.8

catalogs:
  react18:
    react: 18.3.1
    react-dom: 18.3.1
    "@types/react": ^18.3.11
    "@types/react-dom": ^18.3.1
